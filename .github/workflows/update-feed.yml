name: Update content feed

on:
  schedule:
    # 06:00 UTC — 09:00 EAT. Daily, not hourly: bot commits would otherwise drown
    # the contribution graph the README still shows.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Rewrite feed block
        run: python3 scripts/update_feed.py

      - name: Commit if the feed moved
        run: |
          if git diff --quiet -- README.md; then
            echo "No feed changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): refresh content feed"
          git push
