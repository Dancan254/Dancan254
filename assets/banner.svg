<svg xmlns="http://www.w3.org/2000/svg" width="840" height="260" viewBox="0 0 840 260" role="img" aria-label="javaguy@nairobi terminal: Ian Dancan, Backend Engineer, Java Instructor, Learn Today. Teach Tomorrow.">
  <title>Ian Dancan — Backend Engineer, Java Instructor</title>

  <style>
    .mono { font-family: 'JetBrains Mono', Menlo, 'DejaVu Sans Mono', Consolas, 'Liberation Mono', monospace; }
    .prompt { fill: #f0196a; font-weight: 700; }
    .cmd    { fill: #E6E6E6; }
    .name   { fill: #FFFFFF; font-weight: 700; }
    .phrase { fill: #ff6b9d; font-weight: 500; }
    .chrome { fill: #6B7A99; }

    .bar { transform-box: fill-box; transform-origin: left center; }
    .cur { fill: #f0196a; animation: blink 1s steps(1) infinite; }

    @keyframes blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }

    /* Cursor rides the reveal edge: same offsets and same steps() as its mask.
       Measured advance is 0.602em across the whole fallback stack. */
    @keyframes x1 {
      0%   { transform: translateX(0) }
      10%  { transform: translateX(212px) }
      28%  { transform: translateX(212px) }
      33%  { transform: translateX(0) }
      100% { transform: translateX(0) }
    }
    @keyframes x2 {
      0%, 33% { transform: translateX(0) }
      43%     { transform: translateX(199px) }
      61%     { transform: translateX(199px) }
      66%     { transform: translateX(0) }
      100%    { transform: translateX(0) }
    }
    @keyframes x3 {
      0%, 66% { transform: translateX(0) }
      76%     { transform: translateX(371px) }
      94%     { transform: translateX(371px) }
      99%     { transform: translateX(0) }
      100%    { transform: translateX(0) }
    }
    .x1 { animation: x1 12s steps(16) infinite }
    .x2 { animation: x2 12s steps(15) infinite }
    .x3 { animation: x3 12s steps(28) infinite }

    /* 12s loop, three 4s slots: type (1.2s) → hold (2.2s) → erase (0.6s) */
    @keyframes t1 {
      0%   { transform: scaleX(0) }
      10%  { transform: scaleX(1) }
      28%  { transform: scaleX(1) }
      33%  { transform: scaleX(0) }
      100% { transform: scaleX(0) }
    }
    @keyframes t2 {
      0%, 33%  { transform: scaleX(0) }
      43%      { transform: scaleX(1) }
      61%      { transform: scaleX(1) }
      66%      { transform: scaleX(0) }
      100%     { transform: scaleX(0) }
    }
    @keyframes t3 {
      0%, 66%  { transform: scaleX(0) }
      76%      { transform: scaleX(1) }
      94%      { transform: scaleX(1) }
      99%      { transform: scaleX(0) }
      100%     { transform: scaleX(0) }
    }
    .b1 { animation: t1 12s steps(16) infinite }
    .b2 { animation: t2 12s steps(15) infinite }
    .b3 { animation: t3 12s steps(28) infinite }

    /* Cursors ride the end of their own phrase; hidden outside their slot. */
    @keyframes c1 { 0%, 32% { opacity: 1 } 33%, 100% { opacity: 0 } }
    @keyframes c2 { 0%, 32% { opacity: 0 } 33%, 65% { opacity: 1 } 66%, 100% { opacity: 0 } }
    @keyframes c3 { 0%, 65% { opacity: 0 } 66%, 98% { opacity: 1 } 99%, 100% { opacity: 0 } }
    .g1 { animation: c1 12s linear infinite }
    .g2 { animation: c2 12s linear infinite }
    .g3 { animation: c3 12s linear infinite }

    @media (prefers-reduced-motion: reduce) {
      .b1, .b2, .b3, .cur, .g1, .g2, .g3, .x1, .x2, .x3 { animation: none }
      .b3 { transform: scaleX(1) }
      .g1, .g2 { opacity: 0 }
      .g3 { opacity: 1 }
      .x3 { transform: translateX(371px) }
    }
  </style>

  <defs>
    <mask id="m1"><rect class="bar b1" x="62" y="176" width="420" height="28" fill="#fff"/></mask>
    <mask id="m2"><rect class="bar b2" x="62" y="176" width="420" height="28" fill="#fff"/></mask>
    <mask id="m3"><rect class="bar b3" x="62" y="176" width="420" height="28" fill="#fff"/></mask>
    <clipPath id="card"><rect x="10" y="10" width="820" height="240" rx="14"/></clipPath>
  </defs>

  <rect x="10" y="10" width="820" height="240" rx="14" fill="#12121f"/>

  <g clip-path="url(#card)">
    <rect x="10" y="10" width="820" height="38" fill="#1a1a2e"/>
  </g>
  <circle cx="36" cy="29" r="6" fill="#f0196a"/>
  <circle cx="58" cy="29" r="6" fill="#ff6b9d"/>
  <circle cx="80" cy="29" r="6" fill="#2e2e4a"/>
  <text class="mono chrome" x="108" y="34" font-size="13">javaguy@nairobi: ~/teaching — zsh</text>

  <rect x="10" y="10" width="820" height="240" rx="14" fill="none" stroke="#2e2e4a" stroke-width="1.5"/>

  <text class="mono" x="40" y="95" font-size="20">
    <tspan class="prompt">$</tspan><tspan class="cmd" dx="10">whoami</tspan>
  </text>

  <text class="mono name" x="40" y="145" font-size="34">Ian Dancan</text>

  <text class="mono prompt" x="40" y="196" font-size="22">$</text>

  <g mask="url(#m1)">
    <text class="mono phrase" x="62" y="196" font-size="22">Backend Engineer</text>
  </g>
  <g mask="url(#m2)">
    <text class="mono phrase" x="62" y="196" font-size="22">Java Instructor</text>
  </g>
  <g mask="url(#m3)">
    <text class="mono phrase" x="62" y="196" font-size="22">Learn Today. Teach Tomorrow.</text>
  </g>

  <g class="g1"><g class="x1"><rect class="cur" x="64" y="178" width="11" height="22"/></g></g>
  <g class="g2"><g class="x2"><rect class="cur" x="64" y="178" width="11" height="22"/></g></g>
  <g class="g3"><g class="x3"><rect class="cur" x="64" y="178" width="11" height="22"/></g></g>
</svg>
